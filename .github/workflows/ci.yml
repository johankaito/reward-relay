name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ─── Quality checks (all branches) ────────────────────────────────────────

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'app/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install

      - name: Run type checking
        run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'app/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install

      - name: Run linting
        run: pnpm lint || echo "Linting optional for now"

  build:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: 'app/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install

      - name: Build application
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ─── Production pipeline (master push only) ───────────────────────────────
  #
  # GitHub environment secrets (Production):
  #   SUPABASE_ACCESS_TOKEN  — account-level token
  #   SUPABASE_PROJECT_REF   — ovqgvobmnzcdtkaosisg
  #   SUPABASE_DB_PASSWORD   — prod DB password
  #   VERCEL_TOKEN           — Vercel personal access token
  #   VERCEL_ORG_ID          — Vercel team/org ID
  #   VERCEL_PROJECT_ID      — Vercel project ID
  #
  # Vercel Production environment variables:
  #   NEXT_PUBLIC_SUPABASE_URL      — https://ovqgvobmnzcdtkaosisg.supabase.co
  #   NEXT_PUBLIC_SUPABASE_ANON_KEY — production anon key
  #   SUPABASE_SERVICE_KEY          — production service_role key

  migrate-production:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [typecheck, build]
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: app
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run production migrations
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase db push --include-all

  deploy-production:
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    needs: [typecheck, build, migrate-production]
    runs-on: ubuntu-latest
    environment:
      name: Production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to production
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
          echo "✅ Deployed to production"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
