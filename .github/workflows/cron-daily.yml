name: Daily Crons

on:
  schedule:
    - cron: '0 0 * * *'   # spending-tracker — midnight UTC
    - cron: '0 1 * * *'   # leaderboard — 01:00 UTC
    - cron: '0 6 * * *'   # ozbargain-parse — 06:00 UTC
    - cron: '0 7 * * *'   # deals-sync — 07:00 UTC
    - cron: '0 8 * * *'   # deal-alerts — 08:00 UTC
  workflow_dispatch:
    inputs:
      job:
        description: 'Job to run'
        required: false
        default: 'all'
        type: choice
        options: [all, spending-tracker, leaderboard, ozbargain-parse, deals-sync, deal-alerts]

jobs:
  spending-tracker:
    name: Spending Tracker
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 0 * * *'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Trigger spending-tracker cron
        run: |
          curl -sf -X POST "${{ vars.VERCEL_APP_URL }}/api/cron/spending-tracker" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 30

  leaderboard:
    name: Leaderboard
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 1 * * *'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Trigger leaderboard cron
        run: |
          curl -sf -X POST "${{ vars.VERCEL_APP_URL }}/api/cron/leaderboard" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 30

  ozbargain-parse:
    name: OzBargain Parse
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 6 * * *'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          package_json_file: app/package.json

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Run OzBargain parse
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: cd app && pnpm tsx scripts/run-ozbargain-parse.ts

  deals-sync:
    name: Deals Sync
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 7 * * *'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: pnpm/action-setup@v3
        with:
          package_json_file: app/package.json

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Run deals sync
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: cd app && pnpm tsx scripts/run-deals-sync.ts

  deal-alerts:
    name: Deal Alerts
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 8 * * *'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Trigger deal-alerts cron
        run: |
          curl -sf -X POST "${{ vars.VERCEL_APP_URL }}/api/cron/deal-alerts" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 30
