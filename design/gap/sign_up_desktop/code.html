<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sign Up | Reward Relay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-dim": "#55e4a9",
              "surface-container-low": "#0e1320",
              "tertiary-fixed": "#00dcfd",
              "on-secondary-fixed": "#3a2a62",
              "on-surface-variant": "#a7aabb",
              "secondary-container": "#4d3d76",
              "error-dim": "#d7383b",
              "surface-container-high": "#1a1f2f",
              "surface-container-lowest": "#000000",
              "on-tertiary": "#005360",
              "primary-fixed-dim": "#55e4a9",
              "on-primary-fixed-variant": "#006343",
              "surface-dim": "#0a0e1a",
              "error": "#ff716c",
              "on-surface": "#e8eafc",
              "surface-tint": "#65f3b6",
              "surface-variant": "#202537",
              "on-error-container": "#ffa8a3",
              "on-secondary": "#47366f",
              "secondary": "#d0bcff",
              "inverse-surface": "#faf8ff",
              "primary-container": "#07b77f",
              "surface-bright": "#252c3e",
              "background": "#0a0e1a",
              "tertiary-dim": "#00cdec",
              "surface": "#0a0e1a",
              "on-tertiary-fixed-variant": "#005360",
              "surface-container": "#141928",
              "on-tertiary-fixed": "#00343d",
              "on-error": "#490006",
              "tertiary-fixed-dim": "#00cdec",
              "error-container": "#9f0519",
              "tertiary": "#78e6ff",
              "on-primary": "#00583b",
              "primary-fixed": "#65f3b6",
              "secondary-fixed-dim": "#cdb9fc",
              "on-secondary-fixed-variant": "#584781",
              "on-tertiary-container": "#004955",
              "on-primary-container": "#002919",
              "secondary-fixed": "#dac9ff",
              "primary": "#65f3b6",
              "outline": "#717584",
              "on-primary-fixed": "#00432c",
              "on-secondary-container": "#d9c8ff",
              "tertiary-container": "#00dcfd",
              "on-background": "#e8eafc",
              "secondary-dim": "#c2aff1",
              "inverse-on-surface": "#515563",
              "outline-variant": "#444755",
              "inverse-primary": "#006d4a",
              "surface-container-highest": "#202537"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .glass-panel {
            background: rgba(20, 25, 40, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(68, 71, 85, 0.15);
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #4EDEA3 0%, #10B981 100%);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex items-center justify-center overflow-hidden relative">
<!-- Ambient Glow Blobs -->
<div class="absolute -top-24 -left-24 w-[500px] h-[500px] bg-primary/20 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute -bottom-24 -right-24 w-[500px] h-[500px] bg-secondary/10 rounded-full blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-md px-6 z-10">
<!-- Logo & Branding Anchor -->
<div class="flex flex-col items-center mb-10">
<div class="mb-4">
<span class="text-4xl font-extrabold text-primary tracking-tighter font-headline">R</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-center">Reward Relay</h1>
<p class="text-on-surface-variant mt-2 text-sm font-medium">Join the Sovereign Ledger</p>
</div>
<!-- Glassmorphism Card -->
<div class="glass-panel p-8 rounded-lg shadow-[0px_24px_48px_-12px_rgba(0,0,0,0.4)]">
<!-- Beta Badge -->
<div class="flex justify-center mb-8">
<div class="inline-flex items-center px-3 py-1 rounded-full bg-primary/10 border border-primary/20">
<span class="text-[10px] font-bold uppercase tracking-widest text-primary">Private Beta — Invite Only</span>
</div>
</div>
<form class="space-y-5">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-wider font-bold text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="mail">mail</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-highest/50 border-none rounded-DEFAULT text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary-dim transition-all outline-none" id="email" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-wider font-bold text-on-surface-variant px-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="lock">lock</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-highest/50 border-none rounded-DEFAULT text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary-dim transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-wider font-bold text-on-surface-variant px-1" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg" data-icon="verified_user">verified_user</span>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-highest/50 border-none rounded-DEFAULT text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary-dim transition-all outline-none" id="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA -->
<button class="w-full h-14 mt-4 bg-primary-gradient rounded-full text-on-primary-fixed font-bold text-sm hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group shadow-lg shadow-primary/20" type="submit">
                    Create account
                    <span class="material-symbols-outlined text-lg transition-transform group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Terms Acceptance -->
<p class="text-center text-[11px] text-on-surface-variant leading-relaxed mt-6 px-4">
                    By clicking Create account, you agree to our <a class="text-primary hover:underline underline-offset-2" href="#">Terms of Service</a> and acknowledge our <a class="text-primary hover:underline underline-offset-2" href="#">Privacy Policy</a>.
                </p>
</form>
</div>
<!-- Secondary Action -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-sm">
                Already have an account? 
                <a class="text-primary font-bold ml-1 hover:underline underline-offset-4" href="/login">Log in</a>
</p>
</div>
</main>
<!-- Decorative Bottom Canvas Details -->
<div class="fixed bottom-0 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-outline-variant/20 to-transparent"></div>
<div class="fixed bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-8 opacity-20 pointer-events-none">
<div class="h-px w-24 bg-outline-variant"></div>
<div class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">Sovereign Financial Protocol v1.4</div>
<div class="h-px w-24 bg-outline-variant"></div>
</div>
</body></html>
