<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Reward Relay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

              fontFamily: {

<style>
        .tabular-nums { font-variant-numeric: tabular-nums; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-glass {
            background: rgba(20, 25, 40, 0.6);
            backdrop-filter: blur(20px);
        }
        .ghost-border {
            border: 1px solid rgba(68, 71, 85, 0.15);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #4EDEA3 0%, #10B981 100%);
        }
        .ambient-glow-green {
            background: radial-gradient(circle, rgba(78, 222, 163, 0.15) 0%, rgba(78, 222, 163, 0) 70%);
        }
        .ambient-glow-purple {
            background: radial-gradient(circle, rgba(208, 188, 255, 0.1) 0%, rgba(208, 188, 255, 0) 70%);
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary selection:text-on-primary overflow-hidden">
<!-- Ambient Background Blobs -->
<div class="fixed top-[-10%] left-[-10%] w-[60%] h-[60%] ambient-glow-green pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[60%] h-[60%] ambient-glow-purple pointer-events-none"></div>
<main class="relative z-10 flex min-h-screen items-center justify-center p-6">
<!-- Login Card -->
<div class="w-full max-w-md bg-glass ghost-border rounded-lg p-10 flex flex-col items-center shadow-[0px_24px_48px_-12px_rgba(0,0,0,0.4)]">
<!-- Brand Section -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-surface-variant mb-4 ghost-border">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tighter text-on-surface">Reward Relay</h1>
<p class="text-on-surface-variant text-sm font-medium mt-1 tracking-wide">The Sovereign Ledger of Prestige</p>
</div>
<!-- Form Section -->
<form class="w-full space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="font-label text-label-sm text-on-surface-variant font-bold tracking-[0.05em] px-1">EMAIL ADDRESS</label>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-highest rounded-DEFAULT border-none text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all font-medium" placeholder="name@luxury.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="font-label text-label-sm text-on-surface-variant font-bold tracking-[0.05em]">PASSWORD</label>
<a class="font-label text-label-sm text-on-surface-variant hover:text-primary transition-colors font-bold tracking-[0.05em]" href="#">FORGOT PASSWORD?</a>
</div>
<div class="relative">
<input class="w-full h-14 px-5 bg-surface-container-highest rounded-DEFAULT border-none text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all font-medium" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 primary-gradient text-on-primary-fixed font-headline font-extrabold rounded-full hover:scale-[1.02] active:scale-[0.98] transition-all shadow-lg shadow-primary/20 mt-4" type="submit">
                    Sign in
                </button>
</form>
<!-- Footer Section -->
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-sm font-medium">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Decorative Elements -->
<div class="absolute inset-0 z-[-1] opacity-20 pointer-events-none">
<div class="absolute top-1/4 right-1/4 w-32 h-32 border border-outline-variant/30 rounded-full"></div>
<div class="absolute bottom-1/4 left-1/3 w-64 h-64 border border-outline-variant/20 rounded-full"></div>
</div>
</main>
<!-- Footer Identity Anchor (Optional but nice) -->
<footer class="fixed bottom-8 w-full text-center z-10 pointer-events-none">
<p class="font-headline text-[10px] uppercase tracking-[0.2em] text-outline-variant">Authorized Access Only</p>
</footer>
</body></html>
