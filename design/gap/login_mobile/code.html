<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Reward Relay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-dim": "#55e4a9",
              "surface-container-low": "#0e1320",
              "tertiary-fixed": "#00dcfd",
              "on-secondary-fixed": "#3a2a62",
              "on-surface-variant": "#a7aabb",
              "secondary-container": "#4d3d76",
              "error-dim": "#d7383b",
              "surface-container-high": "#1a1f2f",
              "surface-container-lowest": "#000000",
              "on-tertiary": "#005360",
              "primary-fixed-dim": "#55e4a9",
              "on-primary-fixed-variant": "#006343",
              "surface-dim": "#0a0e1a",
              "error": "#ff716c",
              "on-surface": "#e8eafc",
              "surface-tint": "#65f3b6",
              "surface-variant": "#202537",
              "on-error-container": "#ffa8a3",
              "on-secondary": "#47366f",
              "secondary": "#d0bcff",
              "inverse-surface": "#faf8ff",
              "primary-container": "#07b77f",
              "surface-bright": "#252c3e",
              "background": "#0a0e1a",
              "tertiary-dim": "#00cdec",
              "surface": "#0a0e1a",
              "on-tertiary-fixed-variant": "#005360",
              "surface-container": "#141928",
              "on-tertiary-fixed": "#00343d",
              "on-error": "#490006",
              "tertiary-fixed-dim": "#00cdec",
              "error-container": "#9f0519",
              "tertiary": "#78e6ff",
              "on-primary": "#00583b",
              "primary-fixed": "#65f3b6",
              "secondary-fixed-dim": "#cdb9fc",
              "on-secondary-fixed-variant": "#584781",
              "on-tertiary-container": "#004955",
              "on-primary-container": "#002919",
              "secondary-fixed": "#dac9ff",
              "primary": "#65f3b6",
              "outline": "#717584",
              "on-primary-fixed": "#00432c",
              "on-secondary-container": "#d9c8ff",
              "tertiary-container": "#00dcfd",
              "on-background": "#e8eafc",
              "secondary-dim": "#c2aff1",
              "inverse-on-surface": "#515563",
              "outline-variant": "#444755",
              "inverse-primary": "#006d4a",
              "surface-container-highest": "#202537"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }
        .bg-login-gradient {
            background: linear-gradient(135deg, #4EDEA3 0%, #10B981 100%);
        }
        .glass-panel {
            background: rgba(27, 31, 44, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(68, 71, 85, 0.15);
        }
        .ambient-glow-green {
            background: radial-gradient(circle, rgba(78, 222, 163, 0.15) 0%, rgba(78, 222, 163, 0) 70%);
        }
        .ambient-glow-purple {
            background: radial-gradient(circle, rgba(208, 188, 255, 0.12) 0%, rgba(208, 188, 255, 0) 70%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface overflow-hidden">
<!-- Ambient Decorative Blobs -->
<div class="fixed top-[-10%] left-[-10%] w-[60%] h-[60%] ambient-glow-green pointer-events-none z-0"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[60%] h-[60%] ambient-glow-purple pointer-events-none z-0"></div>
<main class="relative z-10 min-h-screen flex items-center justify-center p-6">
<!-- Login Card -->
<div class="w-full max-w-md glass-panel p-8 md:p-12 rounded-lg shadow-[0px_24px_48px_-12px_rgba(0,0,0,0.4)] transition-all duration-300">
<!-- Branding Header -->
<div class="text-center mb-10">
<div class="inline-block mb-4">
<span class="text-3xl font-extrabold font-headline tracking-tighter text-primary">
                        Reward Relay
                    </span>
</div>
<p class="text-on-surface-variant font-body text-sm tracking-wide">
                    Elevate your wealth. Velocity 'R' Monogram.
                </p>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-[10px] uppercase tracking-[0.05em] font-label text-on-surface-variant ml-1">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-DEFAULT pl-12 pr-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="name@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-[10px] uppercase tracking-[0.05em] font-label text-on-surface-variant">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="w-full bg-surface-container-highest border-none rounded-DEFAULT pl-12 pr-4 py-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Utilities -->
<div class="flex items-center justify-between">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="rounded-sm border-none bg-surface-container-highest text-primary focus:ring-primary/20 transition-all" type="checkbox"/>
<span class="text-xs text-on-surface-variant group-hover:text-on-surface transition-colors">Keep me signed in</span>
</label>
<a class="text-xs text-on-surface-variant hover:text-primary transition-colors font-medium" href="#">Forgot password?</a>
</div>
<!-- CTA -->
<button class="w-full bg-login-gradient py-4 rounded-full text-on-primary-container font-bold font-headline tracking-tight shadow-lg shadow-primary/10 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                    Sign in
                    <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Social/Alt Login Separation -->
<div class="mt-10 pt-8 border-t border-white/5">
<p class="text-center text-xs text-on-surface-variant mb-6">Or continue with</p>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 bg-surface-container-high py-3 rounded-DEFAULT hover:bg-surface-container-highest transition-colors group">
<span class="material-symbols-outlined text-on-surface group-hover:text-primary transition-colors">account_balance</span>
<span class="text-xs font-medium">Wallet</span>
</button>
<button class="flex items-center justify-center gap-2 bg-surface-container-high py-3 rounded-DEFAULT hover:bg-surface-container-highest transition-colors group">
<span class="material-symbols-outlined text-on-surface group-hover:text-primary transition-colors">fingerprint</span>
<span class="text-xs font-medium">Passkey</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-10 text-center">
<p class="text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Sign up</a>
</p>
</div>
</div>
</main>
<!-- Navigation Suppressed for Transactional Flow (Login) per Creative North Star rules -->
</body></html>
